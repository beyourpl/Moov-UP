# Déploiement auto : chaque push sur `main` → SSH vers le VPS → git pull + Docker.
#
# Secrets GitHub (Settings → Secrets and variables → Actions) :
#   VPS_HOST          ex. 178.104.253.218
#   VPS_USER          ex. root
#   VPS_SSH_KEY_B64   optionnel (recommandé) : une seule ligne base64 du fichier clé privée brut.
#                     Linux/Mac : base64 -w0 ~/.ssh/id_ed25519  puis colle le résultat (évite troncature UI).
#   VPS_SSH_KEY       sinon : clé privée complète multiligne (BEGIN … END). UTF-8 + CRLF gérés par le job.
#   VPS_DEPLOY_PATH   ex. /root/tempo  (dossier qui contient docker-compose.yml)
#   VPS_SSH_PORT      optionnel : port SSH si ≠ 22 (ex. 2222)
#
# Sur le VPS : clone du repo une fois + backend/.env configuré.
# Repo public : git pull sans login. Repo privé : ajoute une deploy key (read) sur GitHub
# et configure-la sur le VPS (~/.ssh) pour ce dépôt.
#
# Dépannage (runs rouges) : GitHub → Actions → ouvrir un run → la carte rouge indique l’étape.
#   • « Contrôle des secrets » → VPS_HOST / VPS_USER / VPS_DEPLOY_PATH vide, ou clé SSH absente.
#   • « Préparer la clé » / ssh-keygen → secret tronqué, mauvaise clé (publique au lieu de privée),
#     base64 invalide. Recréer VPS_SSH_KEY_B64 (une seule ligne, sans retours).
#   • « Port SSH joignable » → pare-feu / mauvaise IP / sshd arrêté / mauvais port.
#   • « SSH — git pull » → Permission denied (publickey) : clé absente de ~/.ssh/authorized_keys
#     pour VPS_USER ; ou passphrase sur la clé. cd: … No such file : VPS_DEPLOY_PATH incorrect.
#     git pull : repo privé sans clé sur le VPS ou conflit.
#   • « getKeyFile … no key found » avec une ancienne étape appleboy : drone-ssh (Go) n’a pas lu la clé ;
#     ce workflow utilise OpenSSH (`ssh` comme en local). Si ça échoue encore : clé protégée par passphrase
#     → retire la passphrase avec ssh-keygen -p, ou déploie depuis une clé sans mot de passe.

name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-moovup
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Contrôle des secrets (sans les afficher)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          ok=1
          [ -n "${VPS_HOST:-}" ] || { echo "::error::Secret VPS_HOST est vide (Settings → Secrets → Actions)."; ok=0; }
          [ -n "${VPS_USER:-}" ] || { echo "::error::Secret VPS_USER est vide."; ok=0; }
          [ -n "${VPS_DEPLOY_PATH:-}" ] || { echo "::error::Secret VPS_DEPLOY_PATH est vide (ex. /root/tempo)."; ok=0; }
          if [ -z "${VPS_SSH_KEY_B64:-}" ] && [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error::Renseigne VPS_SSH_KEY_B64 ou VPS_SSH_KEY (clé privée de déploiement)."
            ok=0
          fi
          [ "$ok" = 1 ] || exit 1
          echo "Secrets obligatoires présents (valeurs non affichées)."

      - name: Préparer la clé SSH sur le runner (B64 ou PEM + vérif ssh-keygen)
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          KEY_FILE="${GITHUB_WORKSPACE}/.ssh_ci/deploy.key"
          python3 << 'PY'
          import base64
          import os
          import re
          import stat
          from pathlib import Path

          ws = Path(os.environ["GITHUB_WORKSPACE"])
          key_path = ws / ".ssh_ci" / "deploy.key"
          key_path.parent.mkdir(parents=True, exist_ok=True)

          b64 = os.environ.get("SSH_KEY_B64", "").strip()
          raw_txt = os.environ.get("SSH_KEY", "")

          if b64:
              blob = base64.b64decode(re.sub(r"\s+", "", b64))
              key_path.write_bytes(blob)
          elif raw_txt and raw_txt.strip():
              raw = raw_txt
              if raw.startswith("\ufeff"):
                  raw = raw[1:]
              norm = raw.replace("\r\n", "\n").replace("\r", "\n")
              key_path.write_text(norm, encoding="utf-8", newline="\n")
          else:
              raise SystemExit(
                  "Renseigne VPS_SSH_KEY_B64 (recommandé) ou VPS_SSH_KEY (clé privée complète)."
              )

          key_path.chmod(stat.S_IRUSR | stat.S_IWUSR)
          print("deploy.key bytes:", key_path.stat().st_size)
          peek = key_path.read_bytes()[:120].decode("utf-8", errors="replace").splitlines()
          head0 = peek[0].strip() if peek else ""
          print("has_pem_begin:", head0.startswith("-----BEGIN"))
          print("first_line_len:", len(head0))
          PY
          if ! ssh-keygen -y -f "$KEY_FILE" </dev/null >/dev/null 2>&1; then
            echo "::error::Clé privée illisible (libcrypto). Cause fréquente : secret tronqué, mauvais fichier (publique au lieu de privée), ou collage incomplet. Crée le secret VPS_SSH_KEY_B64 avec : base64 -w0 ~/.ssh/id_ed25519 (Linux/Mac), une ligne dans GitHub."
            exit 255
          fi

      # Vérifie que le pare-feu / le port SSH laisse passer GitHub avant d’essayer l auth.
      - name: Port SSH joignable depuis le runner
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          trim() { echo -n "${1:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          H=$(trim "${VPS_HOST}")
          P=$(trim "${VPS_SSH_PORT:-22}")
          # Si VPS_HOST est du type ipv4:port ou domaine:port (pas IPv6 entre crochets)
          if [[ "$H" != \[* ]] && [[ "$H" == *:* ]]; then
            maybe_port="${H##*:}"
            if [[ "$maybe_port" =~ ^[0-9]+$ ]]; then
              P="$maybe_port"
              H="${H%:*}"
            fi
          fi
          echo "Test TCP vers le serveur SSH (sans authentifier)…"
          if ! timeout 20 bash -c "exec 3<>/dev/tcp/${H}/${P}"; then
            echo "::error::Aucune réponse sur ${H}:${P} depuis GitHub Actions. Vérifie : IP publique, port SSH, pare-feu Hetzner Cloud (entrée TCP ${P} depuis Internet), et que sshd tourne sur le VPS."
            exit 1
          fi
          echo "OK — port ${P} joignable."

      # OpenSSH sur le runner (même moteur que ssh-keygen). appleboy/drone-ssh utilisait crypto Go et
      # peut échouer avec « ssh: no key found » sur certaines clés pourtant valides pour OpenSSH.
      - name: SSH — git pull + Docker
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          trim() { echo -n "${1:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          KEY_FILE="${GITHUB_WORKSPACE}/.ssh_ci/deploy.key"
          VPS_HOST=$(trim "${VPS_HOST}")
          VPS_USER=$(trim "${VPS_USER}")
          VPS_DEPLOY_PATH=$(trim "${VPS_DEPLOY_PATH}")
          PORT=$(trim "${VPS_SSH_PORT:-22}")
          if [[ "$VPS_HOST" != \[* ]] && [[ "$VPS_HOST" == *:* ]]; then
            maybe_port="${VPS_HOST##*:}"
            if [[ "$maybe_port" =~ ^[0-9]+$ ]]; then
              PORT="$maybe_port"
              VPS_HOST="${VPS_HOST%:*}"
            fi
          fi
          test -s "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PORT_ARGS=()
          if [ -n "$PORT" ] && [ "$PORT" != "22" ]; then
            PORT_ARGS=(-p "$PORT")
          fi
          REMOTE_PATH=$(printf '%q' "${VPS_DEPLOY_PATH}")
          REMOTE_CMD="set -ex && cd ${REMOTE_PATH} && pwd && git pull --ff-only && if docker compose version >/dev/null 2>&1; then docker compose up -d --force-recreate --build; elif command -v docker-compose >/dev/null 2>&1; then docker-compose up -d --force-recreate --build; else echo 'Ni docker compose ni docker-compose sur le VPS' >&2; exit 1; fi"
          ssh "${PORT_ARGS[@]}" \
            -i "$KEY_FILE" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=12 \
            "${VPS_USER}@${VPS_HOST}" \
            "bash -lc $(printf '%q' "$REMOTE_CMD")"
