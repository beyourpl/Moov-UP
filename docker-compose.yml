services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/data:/app/data
      - hf_cache:/root/.cache/huggingface
      - sqlite_data:/app/db
    env_file: ./backend/.env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      # URL vue par le navigateur. Sur https://moovup.site, mettre https://api.moovup.site (voir env.compose.example).
      # Sinon le front corrige souvent tout seul via VITE_PUBLIC_DOMAIN + détection HTTPS.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_PUBLIC_DOMAIN: ${VITE_PUBLIC_DOMAIN:-moovup.site}
    depends_on:
      - backend

volumes:
  hf_cache:
  sqlite_data:
